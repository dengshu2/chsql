name: Release

# Publish to PyPI when a version tag is pushed, e.g.:
#   git tag v0.3.0 && git push origin v0.3.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored anywhere.
# One-time PyPI setup (Account → Publishing → Add a pending publisher):
#   PyPI Project Name: chsql
#   Owner:             dengshu2
#   Repository name:   chsql
#   Workflow name:     release.yml
#   Environment name:  pypi

on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
